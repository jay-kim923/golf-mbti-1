    <script>
        const questions = [
            {q:"1. 라운딩에서 나는?", a:"동반자와 활발히 대화", t1:"E", b:"조용히 집중", t2:"I"},
            {q:"2. 새로운 모임에 가면?", a:"먼저 말 건다", t1:"E", b:"적응 후 말한다", t2:"I"},
            {q:"3. 에너지는?", a:"사람들과 있으면 상승", t1:"E", b:"혼자 있어야 회복", t2:"I"},
            {q:"4. 내기 제안이 오면?", a:"바로 수락", t1:"E", b:"신중히 고민", t2:"I"},
            {q:"5. 회식은?", a:"참석", t1:"E", b:"패스", t2:"I"},
            {q:"6. 코스 공략은?", a:"현장 감각", t1:"S", b:"전략 분석", t2:"N"},
            {q:"7. 연습 스타일은?", a:"반복 훈련", t1:"S", b:"이론 연구", t2:"N"},
            {q:"8. 새 코스는?", a:"가서 본다", t1:"S", b:"미리 조사", t2:"N"},
            {q:"9. 스윙 교정은?", a:"몸으로 익힘", t1:"S", b:"원리 이해", t2:"N"},
            {q:"10. 영상은?", a:"레슨 위주", t1:"S", b:"전략 분석", t2:"N"},
            {q:"11. 실수한 동반자에게?", a:"팩트 조언", t1:"T", b:"공감 위로", t2:"F"},
            {q:"12. OB가 나면?", a:"원인 분석", t1:"T", b:"멘탈 케어", t2:"F"},
            {q:"13. 스코어 vs 분위기?", a:"스코어", t1:"T", b:"분위기", t2:"F"},
            {q:"14. 내기 상황은?", a:"냉정", t1:"T", b:"관계 고려", t2:"F"},
            {q:"15. 피드백은?", a:"객관적 평가", t1:"T", b:"격려 중심", t2:"F"},
            {q:"16. 준비는?", a:"계획 철저", t1:"J", b:"즉흥", t2:"P"},
            {q:"17. 연습 루틴은?", a:"고정", t1:"J", b:"유동적", t2:"P"},
            {q:"18. 플레이 속도는?", a:"빠르게", t1:"J", b:"여유롭게", t2:"P"},
            {q:"19. 비 오면?", a:"강행", t1:"J", b:"상황 보자", t2:"P"},
            {q:"20. 시즌 목표는?", a:"명확 설정", t1:"J", b:"흐름 따라", t2:"P"}
        ];

        let current = 0;
        let score = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        document.getElementById('start-btn').addEventListener('click', startTest);

        function startTest() {
            document.getElementById('intro').classList.add('hidden');
            document.getElementById('question').classList.remove('hidden');
            document.getElementById('answers').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            if (current < questions.length) {
                let q = questions[current];
                document.getElementById('question').innerHTML = `<h3>${q.q}</h3>`;
                document.getElementById('answers').innerHTML = 
                    `<button onclick="answer('${q.t1}')">${q.a}</button>\n<button onclick="answer('${q.t2}')">${q.b}</button>`;
            } else {
                showResult();
            }
        }

        function answer(type) {
            score[type]++;
            current++;
            showQuestion();
        }

        function showResult() {
            let type = 
                (score.E >= score.I ? 'E' : 'I') +
                (score.S >= score.N ? 'S' : 'N') +
                (score.T >= score.F ? 'T' : 'F') +
                (score.J >= score.P ? 'J' : 'P');

            saveResult(type);

            const data = {
                "ESTJ": { name: "🏆 필드의 전략 지휘관 (ESTJ)", desc: "승부욕과 조직력이 강한 리더형 골퍼", strength: ["일관성 있는 플레이", "목표 달성 능력", "멘탈 안정"], weak: ["융통성 부족", "동반자에게 엄격"], tip: "📌 코스별 시뮬레이션 연습 + 숏게임 반복 훈련" },
                "ESTP": { name: "⚡ 필드의 에너자이저 (ESTP)", desc: "활동적이고 적응력이 뛰어난 실전파 골퍼", strength: ["위기 대처 능력", "장타력", "적극적인 공략"], weak: ["무모한 도전", "집중력 저하"], tip: "📌 상황별 트러블 샷 연습 + 템포 조절 훈련" },
                "ESFJ": { name: "🤝 친절한 분위기 메이커 (ESFJ)", desc: "동반자와의 조화를 중시하는 사교적 골퍼", strength: ["팀 분위기 주도", "배려심 깊은 플레이", "안정적인 멘탈"], weak: ["타인 시선 의식", "자신감 부족"], tip: "📌 자신만의 루틴 만들기 + 퍼팅 집중 연습" },
                "ESFP": { name: "🎬 필드의 슈퍼스타 (ESFP)", desc: "즐거움을 추구하고 감각적인 플레이를 하는 골퍼", strength: ["즉흥적인 위기 탈출", "화려한 퍼포먼스", "긍정적인 에너지"], weak: ["일관성 부족", "감정 기복"], tip: "📌 기본기 반복 훈련 + 정밀한 거리 조절 연습" },
                "ENTJ": { name: "🚩 대담한 필드 지배자 (ENTJ)", desc: "철저한 계획과 강력한 추진력의 야망가 골퍼", strength: ["장기적인 목표 설정", "효율적인 공략", "강한 승부욕"], weak: ["과도한 긴장", "완벽주의적 성향"], tip: "📌 멘탈 릴렉스 훈련 + 숏게임 감각 강화" },
                "ENTP": { name: "💡 변수 지배자 (ENTP)", desc: "창의적이고 위기에서 빛나는 골퍼", strength: ["위기 대처 능력", "창의적 공략", "빠른 상황 판단"], weak: ["일관성 부족", "기본 루틴 소홀"], tip: "📌 상황별 트러블 샷 연습 + 기본 루틴 강화" },
                "ENFJ": { name: "🌟 필드의 이상적 리더 (ENFJ)", desc: "동반자를 독려하고 목표를 향해 나아가는 골퍼", strength: ["리더십과 소통", "높은 집중력", "긍정적인 마인드"], weak: ["과도한 감정이입", "자기 관리 소홀"], tip: "📌 자신에게 집중하는 시간 갖기 + 일관된 스윙 연습" },
                "ENFP": { name: "🎈 무한 긍정 스윙어 (ENFP)", desc: "창의적이고 열정적으로 즐거움을 찾는 골퍼", strength: ["높은 회복 탄력성", "기발한 샷 메이킹", "동반자와의 시너지"], weak: ["집중력 분산", "세밀함 부족"], tip: "📌 타겟팅 집중 훈련 + 정기적인 연습 루틴" },
                "ISTJ": { name: "📊 데이터 마스터 (ISTJ)", desc: "분석 중심의 정석 플레이어", strength: ["정확도", "루틴 관리", "신중한 판단"], weak: ["과도한 계산", "예상치 못한 변수 취약"], tip: "📌 실전 라운딩 연습으로 감각 강화 + 유연한 사고 훈련" },
                "ISTP": { name: "🛠 실전 기술의 달인 (ISTP)", desc: "냉철한 상황 판단과 정교한 기술의 골퍼", strength: ["뛰어난 도구 활용력", "침착한 위기 관리", "효율적인 플레이"], weak: ["무뚝뚝한 태도", "설명 부족"], tip: "📌 다양한 클럽 활용법 연습 + 부드러운 스윙 템포" },
                "ISFJ": { name: "🛡 신중한 수호자 (ISFJ)", desc: "안정적이고 책임감 있게 플레이하는 골퍼", strength: ["정확한 샷 제어", "안정적인 스코어 관리", "성실한 연습"], weak: ["모험적인 시도 부족", "자기 확신 부족"], tip: "📌 비거리 향상 훈련 + 적극적인 코스 공략" },
                "ISFP": { name: "🎨 필드의 예술가 (ISFP)", desc: "감각적이고 유연한 플레이를 선호하는 골퍼", strength: ["부드러운 스윙", "탁월한 거리감", "적응력"], weak: ["압박감에 취약", "결정 장애"], tip: "📌 자신감 있는 퍼팅 연습 + 멘탈 강화 훈련" },
                "INTJ": { name: "🧠 완벽한 전략가 (INTJ)", desc: "치밀한 분석과 독립적인 판단의 골퍼", strength: ["철저한 코스 분석", "일관된 플레이 전략", "높은 지적 호기심"], weak: ["과도한 자기 검열", "사교성 부족"], tip: "📌 직관적인 감각 키우기 + 동반자와의 소통 연습" },
                "INTP": { name: "🔍 필드의 아이디어 뱅크 (INTP)", desc: "논리적이고 혁신적인 공략을 추구하는 골퍼", strength: ["새로운 공략법 발견", "기술적인 이해도", "냉정한 분석"], weak: ["실천력 부족", "반복적인 루틴 지루함"], tip: "📌 기본 루틴 습관화 + 실전 감각 익히기" },
                "INFJ": { name: "🕯 통찰력 있는 조력자 (INFJ)", desc: "깊은 통찰력으로 의미 있는 플레이를 하는 골퍼", strength: ["높은 집중력", "자기 성찰 능력", "동반자와의 조화"], weak: ["완벽에 대한 압박", "에너지 소모 빠름"], tip: "📌 체력 관리 및 휴식 + 단순한 스윙 생각하기" },
                "INFP": { name: "🌸 감성 몰입형 아티스트 (INFP)", desc: "자기만의 리듬으로 플레이하는 힐링 골퍼", strength: ["집중력", "감각적 퍼팅", "부드러운 스윙"], weak: ["기복 심함", "승부욕 약함"], tip: "📌 멘탈 루틴 만들기 + 3m 퍼팅 반복" }
            };

            let resultHTML = `
                <div class="resultBox">
                    <h2>${data[type].name}</h2>
                    <p><strong>성향:</strong> ${data[type].desc}</p>
                    <h3>✅ 장점</h3>
                    <ul>${data[type].strength.map(s => `<li>${s}</li>`).join('')}</ul>
                    <h3>⚠️ 약점</h3>
                    <ul>${data[type].weak.map(s => `<li>${s}</li>`).join('')}</ul>
                    <h3>🎯 추천 연습법</h3>
                    <p>${data[type].tip}</p>
                    <div style="margin-top: 20px;">
                        <button class="form-button" onclick="location.href='ranking.html'">랭킹 확인하기</button>
                        <button class="restart" onclick="location.reload()">다시 테스트하기</button>
                    </div>
                </div>
            `;

            document.getElementById('question').innerHTML = "";
            document.getElementById('answers').innerHTML = "";
            document.getElementById('result').innerHTML = resultHTML;
        }

        function saveResult(type) {
            let counts = JSON.parse(localStorage.getItem('mbti_counts') || '{}');
            counts[type] = (counts[type] || 0) + 1;
            localStorage.setItem('mbti_counts', JSON.stringify(counts));
        }
    </script>
